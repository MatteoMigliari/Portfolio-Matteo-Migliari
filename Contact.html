<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

</head>

<body class="contact-page">

    <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="about-me.html">SU DI ME</a></li>
            <li><a href="Contact.html">CONTATTI</a></li>
        </ul>
    </nav>

    <div class="mobile-header-bar">
    <div class="hamburger-icon" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

    <div id="menu-overlay" class="menu-overlay" onclick="toggleMenu()"></div>

    <div class="menu">
        <div class="close-icon" onclick="toggleMenu()">&times;</div>
        <div class="menu-links">
            <a href="index.html">Home</a>
            <a href="about-me.html">Su di me</a>
            <a href="Contact.html">Contatti</a>
        </div>
        <div class="menu-socials">
            <a href="https://www.behance.net/matteomigliari1" target="_blank"><i class="fab fa-behance"></i></a>
            <a href="https://www.linkedin.com/in/matteo-migliari-702045281/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
        </div>
    </div>

    <header>
        <div class="container">
            <div class="row">
                <div class="titolo col-md-6 mx-auto">
                    <h1>Ciao, <span class="animate"></span></h1>
                </div>
            </div>
        </div>  

        <div class="icon-container">
            <a href="javascript:void(0)" onclick="copyEmail(this)" data-email="matteomiglia@hotmail.com">
                <img class="icon" src="elementi/email bianca.svg" alt="Email">
                <div class="icon-description">E-mail</div>
                <span class="copy-feedback">Copiata!</span>
            </a>
            <a href="https://www.behance.net/matteomigliari1" target="_blank">
                <img class="icon" src="elementi/behance bianco.svg" alt="Behance">
                <div class="icon-description">Behance</div>
            </a>
            <a href="https://www.linkedin.com/in/matteo-migliari-50a104253/" target="_blank">
                <img class="icon" src="elementi/linkedin bianco.svg" alt="Linkedin">
                <div class="icon-description">Linkedin</div>
            </a>
        </div>
    </header>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10" style="max-width: 750px;"> 
                <h2 class="cv-title">Di cosa vogliamo parlare?</h2> 
                <form id="contact-form" class="contact-form">
                    <div class="row">
                        <div class="col-md-6">
                            <input type="text" name="user_name" placeholder="Nome" required>
                        </div>
                        <div class="col-md-6">
                            <input type="email" name="user_email" placeholder="Email" required>
                        </div>
                    </div>
                    <textarea name="message" rows="4" placeholder="Come posso aiutarti?" required></textarea>
                    <div class="text-center">
                        <button type="submit" class="btn-submit" id="button-send">Invia il messaggio</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer-minimal text-center">
        <div class="container">
            <p class="mb-2">© 2026 Matteo Migliari</p>
            <div class="social-icons">
                <a href="https://www.behance.net/matteomigliari1" target="_blank" class="mx-2"><i class="bi bi-behance"></i></a>
                <a href="https://www.linkedin.com/in/matteo-migliari-50a104253/" target="_blank" class="mx-2"><i class="bi bi-linkedin"></i></a>
            </div>
        </div>
    </footer>

    <script>

        (function(){
            emailjs.init("eIYvBKs7x7icqhniq");
        })();

        var typed = new Typed('.animate', {
            strings: ["questi sono i miei contatti:"],
            typeSpeed: 40,
            loop: false
        });

        function toggleMenu() {
            const menu = document.querySelector('.menu');
            const overlay = document.querySelector('.menu-overlay');
            const icon = document.querySelector('.hamburger-icon');
            
            menu.classList.toggle('open');
            if (overlay) overlay.classList.toggle('active');
            if (icon) icon.classList.toggle('hidden');
            
            document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : 'auto';
        }

        function copyEmail(element) {
            const email = element.getAttribute('data-email');
            navigator.clipboard.writeText(email).then(() => {
                const feedback = element.querySelector('.copy-feedback');
                feedback.style.opacity = '1';
                setTimeout(() => { feedback.style.opacity = '0'; }, 2000);
            });
        }

        const btn = document.getElementById('button-send');
        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();
            btn.innerText = 'Invio in corso...';

            const serviceID = 'default_service';
            const templateID = 'template_ugzqa2f';

            emailjs.sendForm(serviceID, templateID, this)
                .then(() => {
                    btn.innerText = 'Messaggio Inviato!';
                    alert('Grazie Matteo, ti risponderò al più presto!');
                    this.reset();
                }, (err) => {
                    btn.innerText = 'Errore...';
                    alert(JSON.stringify(err));
                });
        });
    </script>
</body>
</html>
